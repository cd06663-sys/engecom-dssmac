<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal da Equipe — ENGECOM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/team.css" rel="stylesheet">
</head>
<body>
  <header class="team-header">
    <div class="container-fluid px-4 d-flex align-items-center gap-3">
      <div class="header-logo">
        <img src="/img/logo.png" alt="ENGECOM" class="header-logo-img">
      </div>
      <div>
        <h1 class="mb-0 fs-5 fw-bold text-white" id="teamTitle">Carregando...</h1>
        <small class="text-white-50" id="teamDistrict"></small>
      </div>
    </div>
  </header>

  <div class="container-fluid px-4 py-4">
    <div id="content">
      <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Carregando dados...</p>
      </div>
    </div>
  </div>

  <!-- Upload Modal -->
  <div class="modal fade" id="modalUpload" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-upload"></i> Enviar Lista Assinada</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="text-muted small">Tire foto da lista assinada ou selecione o arquivo PDF. Você pode enviar múltiplos arquivos.</p>
          <input type="hidden" id="uploadAssignmentId">
          <div class="upload-area" id="uploadArea">
            <i class="bi bi-cloud-arrow-up fs-1 text-muted"></i>
            <p class="mt-2 mb-1 fw-bold">Arraste arquivos aqui</p>
            <p class="text-muted small">ou clique para selecionar</p>
            <input type="file" id="fileInput" multiple
              accept=".jpg,.jpeg,.png,.pdf,.heic,.heif,.webp" style="display:none">
          </div>
          <div id="filePreview" class="mt-3 d-flex flex-wrap gap-2"></div>
          <div id="uploadProgress" class="mt-3" style="display:none">
            <div class="progress">
              <div class="progress-bar progress-bar-striped progress-bar-animated"
                   style="width:100%"></div>
            </div>
            <p class="text-center small mt-1 text-muted">Enviando...</p>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-success" id="btnSendFiles" disabled onclick="uploadFiles()">
            <i class="bi bi-send-fill"></i> Enviar
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- View Submissions Modal -->
  <div class="modal fade" id="modalViewSubs" tabindex="-1">
    <div class="modal-dialog modal-xl">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-images"></i> Documentos Enviados</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="viewSubsBody"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/team.js"></script>
</body>
</html>
