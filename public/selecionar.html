<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENGECOM DSSMAC — Selecionar Equipe</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a3a6b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="DSSMAC">
  <link rel="apple-touch-icon" href="/img/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f1f3f6; min-height: 100vh; }

    .header {
      background: #1a3a6b;
      padding: 18px 20px 14px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .header img { height: 40px; filter: brightness(0) invert(1); }
    .header h1 { color: #fff; font-size: 19px; font-weight: 800; }
    .header p  { color: rgba(255,255,255,.65); font-size: 13px; }

    .content { padding: 20px 16px 40px; max-width: 600px; margin: 0 auto; }

    .district-label {
      font-size: 11px; font-weight: 700; color: #888;
      text-transform: uppercase; letter-spacing: .8px;
      margin: 24px 0 10px;
    }
    .district-label:first-child { margin-top: 8px; }

    .team-btn {
      display: flex; align-items: center; gap: 14px;
      width: 100%; padding: 16px 18px;
      background: #fff; border: none; border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      cursor: pointer; margin-bottom: 10px;
      text-align: left; transition: transform .1s, box-shadow .1s;
    }
    .team-btn:active { transform: scale(.98); box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .team-icon {
      width: 46px; height: 46px; border-radius: 12px;
      background: #1a3a6b; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .team-icon i { font-size: 22px; color: #fff; }
    .team-name { font-size: 17px; font-weight: 700; color: #1a2a45; }
    .team-sub  { font-size: 13px; color: #888; margin-top: 2px; }

    .empty { text-align: center; padding: 60px 20px; color: #aaa; }
    .empty i { font-size: 48px; display: block; margin-bottom: 14px; }

    .loading {
      text-align: center; padding: 60px 20px;
      font-size: 15px; color: #888;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #dee2e6;
      border-top-color: #1a3a6b; border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header class="header">
    <img src="/img/logo.png" alt="ENGECOM">
    <div>
      <h1>ENGECOM DSSMAC</h1>
      <p>Selecione sua equipe</p>
    </div>
  </header>

  <div class="content" id="content">
    <div class="loading">
      <div class="spinner"></div>
      Carregando equipes...
    </div>
  </div>

  <script>
    const BASE = '';

    async function load() {
      const el = document.getElementById('content');
      try {
        const teams = await fetch('/api/teams').then(r => r.json());
        if (!Array.isArray(teams) || teams.length === 0) {
          el.innerHTML = '<div class="empty"><i class="bi bi-people"></i><p>Nenhuma equipe cadastrada.</p></div>';
          return;
        }

        // Group by district
        const byDistrict = {};
        teams.forEach(t => {
          const d = t.district_name || 'Sem Distrito';
          if (!byDistrict[d]) byDistrict[d] = [];
          byDistrict[d].push(t);
        });

        let html = '';
        Object.entries(byDistrict).sort((a, b) => a[0].localeCompare(b[0])).forEach(([dist, list]) => {
          html += `<div class="district-label"><i class="bi bi-geo-alt-fill me-1"></i>${dist}</div>`;
          list.forEach(t => {
            html += `
              <button class="team-btn" onclick="selectTeam(${t.id}, '${esc(t.name)}')">
                <div class="team-icon"><i class="bi bi-people-fill"></i></div>
                <div>
                  <div class="team-name">${esc(t.name)}</div>
                  <div class="team-sub">${t.district_city ? esc(t.district_city) : esc(dist)}${t.specialty ? ' • ' + esc(t.specialty) : ''}</div>
                </div>
                <i class="bi bi-chevron-right" style="margin-left:auto;color:#ccc;font-size:18px;"></i>
              </button>`;
          });
        });
        el.innerHTML = html;
      } catch {
        el.innerHTML = '<div class="empty"><i class="bi bi-wifi-off"></i><p>Sem conexão. Tente novamente.</p></div>';
      }
    }

    function selectTeam(id, name) {
      try { localStorage.setItem('dssmac_team_id', id); } catch {}
      window.location.href = '/equipe/' + id;
    }

    function esc(v) {
      return String(v ?? '').replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // Se já tem equipe salva, pula direto
    const saved = localStorage.getItem('dssmac_team_id');
    if (saved) {
      window.location.replace('/equipe/' + saved);
    } else {
      load();
    }
  </script>
</body>
</html>
